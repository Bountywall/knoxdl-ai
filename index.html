<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnoxDL AI — NBA Player Props Predictions</title>
  <meta name="description" content="Daily NBA player props predictions powered by AI. Points, rebounds, assists and more for every player in tonight's games." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5.19825 3.29918C5.80046 2 7.86697 2 12 2C16.133 2 18.1995 2 18.8017 3.29918C18.8535 3.41086 18.8972 3.52686 18.9323 3.6461C19.3414 5.0333 17.8802 6.64111 14.9577 9.85674L13 12L14.9577 14.1433C17.8802 17.3589 19.3414 18.9667 18.9323 20.3539C18.8972 20.4731 18.8535 20.5891 18.8017 20.7008C18.1995 22 16.133 22 12 22C7.86697 22 5.80046 22 5.19825 20.7008C5.14649 20.5891 5.10282 20.4731 5.06765 20.3539C4.65857 18.9667 6.11981 17.3589 9.0423 14.1433L11 12L9.0423 9.85674C6.11981 6.64111 4.65857 5.0333 5.06765 3.6461C5.10282 3.52686 5.14649 3.41086 5.19825 3.29918Z' fill='%2342ffb5'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #0a0e0c;
      --bg-surface:    #111714;
      --bg-card:       #141a17;
      --bg-card-hover: #1a2320;
      --border:        rgba(66,255,181,0.1);
      --border-strong: rgba(66,255,181,0.2);
      --accent:        #42ffb5;
      --accent-dim:    rgba(66,255,181,0.12);
      --text-primary:  #e8f5f0;
      --text-secondary:#7a9e8e;
      --text-muted:    #4a6357;
      --font-display:  'Space Grotesk', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --radius:        12px;
      --radius-sm:     8px;
      --max-w:         1100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text-primary);
      font-family: var(--font-body); font-size: 16px;
      line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,14,12,0.88); backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 24px;
      height: 62px; display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .brand-logo { width: 26px; height: 26px; }
    .brand-name { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }

    /* ── HERO ── */
    .hero { padding: 60px 0 40px; text-align: center; position: relative; overflow: hidden; }
    .hero-glow {
      position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(66,255,181,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-title { font-family: var(--font-display); font-size: clamp(28px,4vw,48px); font-weight: 700; letter-spacing: -1.2px; line-height: 1.1; margin-bottom: 14px; }
    .hero-title .accent { color: var(--accent); }
    .hero-sub { color: var(--text-secondary); font-size: 16px; max-width: 500px; margin: 0 auto 16px; }
    .generated-at { color: var(--text-muted); font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .generated-at span { color: var(--accent); }

    /* ── PREDICTIONS AREA ── */
    .predictions-area { position: relative; min-height: 520px; padding: 0 0 80px; }

    /* ── INLINE LOADER ── */
    .area-loader {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      background: var(--bg); border-radius: var(--radius); z-index: 10;
      transition: opacity 0.4s ease, visibility 0.4s ease; min-height: 400px;
    }
    .area-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-logo-wrap { position: relative; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; }
    .loader-halo { position: absolute; inset: -8px; border-radius: 4px; background: transparent; animation: halo-pulse 2s ease-in-out infinite; }
    @keyframes halo-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(66,255,181,0.35); }
      50%  { box-shadow: 0 0 28px 8px rgba(66,255,181,0.12); }
      100% { box-shadow: 0 0 0 0 rgba(66,255,181,0.35); }
    }
    .loader-logo { width: 48px; height: 48px; position: relative; z-index: 1; animation: logo-breathe 2s ease-in-out infinite; }
    @keyframes logo-breathe {
      0%   { transform: scale(1);    filter: drop-shadow(0 0 6px rgba(66,255,181,0.5)); }
      50%  { transform: scale(1.12); filter: drop-shadow(0 0 16px rgba(66,255,181,0.8)); }
      100% { transform: scale(1);    filter: drop-shadow(0 0 6px rgba(66,255,181,0.5)); }
    }
    .loader-label { font-family: var(--font-display); font-size: 14px; font-weight: 500; color: var(--text-secondary); }
    .loader-bar { width: 120px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .loader-bar-fill { height: 100%; width: 40%; background: var(--accent); border-radius: 2px; animation: bar-slide 1.6s ease-in-out infinite; }
    @keyframes bar-slide {
      0%   { transform: translateX(-100%); opacity: 0.8; }
      50%  { opacity: 1; }
      100% { transform: translateX(350%); opacity: 0.8; }
    }

    .games-wrapper { opacity: 0; transform: translateY(10px); transition: opacity 0.45s ease, transform 0.45s ease; }
    .games-wrapper.visible { opacity: 1; transform: translateY(0); }

    /* ── GAME TABS (top level — which game) ── */
    .game-tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .game-tab {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
      padding: 8px 16px; cursor: pointer; transition: all 0.2s;
    }
    .game-tab:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .game-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .game-panel { display: none; }
    .game-panel.active { display: block; }

    /* ── MODE SWITCHER (Form vs H2H) ── */
    .mode-switcher {
      display: flex; gap: 4px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      width: fit-content;
      margin-bottom: 20px;
    }
    .mode-btn {
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
      padding: 7px 18px; border-radius: 6px; border: none;
      cursor: pointer; transition: all 0.2s; color: var(--text-muted);
      background: transparent;
    }
    .mode-btn:hover { color: var(--text-secondary); }
    .mode-btn.active { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-strong); }
    .mode-btn.active.form { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
    .mode-btn.active.h2h  { color: #f5c26b; border-color: rgba(245,194,107,0.3); background: rgba(245,194,107,0.08); }

    .mode-view { display: none; }
    .mode-view.active { display: block; }

    /* ── TOTAL BAR ── */
    .total-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-card); border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); padding: 12px 18px; margin-bottom: 16px;
    }
    .total-bar.h2h-style { border-color: rgba(245,194,107,0.3); background: rgba(245,194,107,0.04); }
    .total-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .total-breakdown { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .total-value { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--accent); }
    .total-value.h2h-style { color: #f5c26b; }

    .no-h2h {
      text-align: center; padding: 48px 24px;
      color: var(--text-muted); font-size: 14px;
      border: 1px dashed var(--border); border-radius: var(--radius);
    }
    .no-h2h strong { display: block; color: var(--text-secondary); font-size: 15px; margin-bottom: 6px; }

    /* ── TEAMS GRID ── */
    .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ── TEAM BOX ── */
    .team-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .team-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg-card); z-index: 2;
    }
    .team-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .team-side-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; }
    .team-side-badge.home { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--border-strong); }
    .team-side-badge.away { background: rgba(122,158,142,0.12); color: var(--text-secondary); border: 1px solid var(--border); }
    .players-scroll { max-height: 520px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
    .players-scroll::-webkit-scrollbar { width: 4px; }
    .players-scroll::-webkit-scrollbar-track { background: transparent; }
    .players-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    /* ── PLAYER ROW ── */
    .player-row { padding: 14px 18px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .player-row:last-child { border-bottom: none; }
    .player-row:hover { background: var(--bg-card-hover); }
    .player-name { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pos-badge { font-size: 10px; font-weight: 600; color: var(--text-muted); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; text-transform: uppercase; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .stat-cell { background: var(--bg-surface); border-radius: 6px; padding: 6px 8px; text-align: center; }
    .stat-val { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1; }
    .stat-val.pts { color: var(--accent); }
    .stat-val.pts.h2h { color: #f5c26b; }
    .stat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }
    .player-meta { margin-top: 7px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .meta-item { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .meta-item svg { width: 10px; height: 10px; stroke: var(--text-muted); }

    /* ── NO GAMES ── */
    .no-games { text-align: center; padding: 80px 24px; color: var(--text-secondary); font-size: 15px; }
    .no-games h2 { font-family: var(--font-display); font-size: 22px; color: var(--text-primary); margin-bottom: 10px; }

    /* ── FOOTER ── */
    .footer { background: var(--bg-surface); border-top: 1px solid var(--border); padding: 32px 0; text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .footer-links a { color: var(--text-secondary); text-decoration: none; font-size: 13px; transition: color 0.2s; }
    .footer-links a:hover { color: var(--accent); }
    .footer-legal { color: var(--text-muted); font-size: 12px; }

    @media (max-width: 680px) {
      .teams-grid { grid-template-columns: 1fr; }
      .nav-links  { display: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="https://knoxdl.com" class="brand">
        <svg viewBox="0 0 24 24" fill="none" class="brand-logo">
          <path d="M5.19825 3.29918C5.80046 2 7.86697 2 12 2C16.133 2 18.1995 2 18.8017 3.29918C18.8535 3.41086 18.8972 3.52686 18.9323 3.6461C19.3414 5.0333 17.8802 6.64111 14.9577 9.85674L13 12L14.9577 14.1433C17.8802 17.3589 19.3414 18.9667 18.9323 20.3539C18.8972 20.4731 18.8535 20.5891 18.8017 20.7008C18.1995 22 16.133 22 12 22C7.86697 22 5.80046 22 5.19825 20.7008C5.14649 20.5891 5.10282 20.4731 5.06765 20.3539C4.65857 18.9667 6.11981 17.3589 9.0423 14.1433L11 12L9.0423 9.85674C6.11981 6.64111 4.65857 5.0333 5.06765 3.6461C5.10282 3.52686 5.14649 3.41086 5.19825 3.29918Z" fill="#42ffb5"/>
        </svg>
        <span class="brand-name">KnoxDL</span>
      </a>
      <div class="nav-links">
        <a href="https://knoxdl.com">Downloader</a>
        <a href="/" class="active">AI Predictions</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-glow"></div>
    <div class="container">
      <h1 class="hero-title">Tonight's <span class="accent">NBA</span> Predictions</h1>
      <p class="hero-sub">AI-powered player props for every game tonight. Points, rebounds, assists and more — updated every morning.</p>
      <p class="generated-at" id="generatedAt"></p>
    </div>
  </section>

  <div class="container">
    <div class="predictions-area">
      <div class="area-loader" id="areaLoader">
        <div class="loader-logo-wrap">
          <div class="loader-halo"></div>
          <svg class="loader-logo" viewBox="0 0 24 24" fill="none">
            <path d="M5.19825 3.29918C5.80046 2 7.86697 2 12 2C16.133 2 18.1995 2 18.8017 3.29918C18.8535 3.41086 18.8972 3.52686 18.9323 3.6461C19.3414 5.0333 17.8802 6.64111 14.9577 9.85674L13 12L14.9577 14.1433C17.8802 17.3589 19.3414 18.9667 18.9323 20.3539C18.8972 20.4731 18.8535 20.5891 18.8017 20.7008C18.1995 22 16.133 22 12 22C7.86697 22 5.80046 22 5.19825 20.7008C5.14649 20.5891 5.10282 20.4731 5.06765 20.3539C4.65857 18.9667 6.11981 17.3589 9.0423 14.1433L11 12L9.0423 9.85674C6.11981 6.64111 4.65857 5.0333 5.06765 3.6461C5.10282 3.52686 5.14649 3.41086 5.19825 3.29918Z" fill="#42ffb5"/>
          </svg>
        </div>
        <span class="loader-label">Loading predictions</span>
        <div class="loader-bar"><div class="loader-bar-fill"></div></div>
      </div>

      <div class="games-wrapper" id="gamesWrapper">
        <div class="game-tabs" id="gameTabs"></div>
        <div id="gamePanels"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <a href="https://knoxdl.com">KnoxDL</a>
        <a href="https://knoxdl.com/privacy.html">Privacy</a>
        <a href="https://knoxdl.com/terms.html">Terms</a>
      </div>
      <p class="footer-legal">© <span id="year"></span> KnoxDL · Predictions are for informational purposes only.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const PREDICTIONS_URL = 'https://raw.githubusercontent.com/Bountywall/knoxdl-ai/main/predictions.json';

    function formatTime(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZoneName:'short' });
      } catch { return ''; }
    }

    function hideLoader() {
      document.getElementById('areaLoader').classList.add('hidden');
      document.getElementById('gamesWrapper').classList.add('visible');
    }

    function renderNoGames(msg) {
      document.getElementById('gamePanels').innerHTML = `
        <div class="no-games"><h2>No games today</h2>
        <p>${msg || 'Check back tomorrow for the next predictions.'}</p></div>`;
    }

    function renderPlayerRow(name, stats, isH2h) {
      const pos   = stats.position || '';
      const ptsCls = isH2h ? 'stat-val pts h2h' : 'stat-val pts';
      const svgBar = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>`;
      const svgX   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
      return `
        <div class="player-row">
          <div class="player-name">
            ${name}
            ${pos ? `<span class="pos-badge">${pos}</span>` : ''}
          </div>
          <div class="stat-grid">
            <div class="stat-cell"><div class="${ptsCls}">${stats.points}</div><div class="stat-lbl">PTS</div></div>
            <div class="stat-cell"><div class="stat-val">${stats.rebounds}</div><div class="stat-lbl">REB</div></div>
            <div class="stat-cell"><div class="stat-val">${stats.assists}</div><div class="stat-lbl">AST</div></div>
            <div class="stat-cell"><div class="stat-val">${stats.minutes}</div><div class="stat-lbl">MIN</div></div>
          </div>
          <div class="player-meta">
            <span class="meta-item">${svgBar} ${stats.steals} STL</span>
            <span class="meta-item">${svgBar} ${stats.blocks} BLK</span>
            <span class="meta-item">${svgX} ${stats.turnovers} TOV</span>
            <span class="meta-item" style="margin-left:auto;color:var(--text-muted)">${stats.games_analyzed}g sample</span>
          </div>
        </div>`;
    }

    function renderTeamBox(abbrev, players, side, isH2h) {
      const entries = Object.entries(players || {});
      if (entries.length === 0) {
        return `<div class="team-box">
          <div class="team-header"><span class="team-name">${abbrev}</span><span class="team-side-badge ${side}">${side}</span></div>
          <div style="padding:24px;color:var(--text-muted);font-size:14px;text-align:center;">No data available</div>
        </div>`;
      }
      const rows = entries.map(([n, s]) => renderPlayerRow(n, s, isH2h)).join('');
      return `<div class="team-box">
        <div class="team-header"><span class="team-name">${abbrev}</span><span class="team-side-badge ${side}">${side}</span></div>
        <div class="players-scroll">${rows}</div>
      </div>`;
    }

    function renderTotalBar(total, awayTeam, homeTeam, isH2h) {
      if (!total) return '';
      const style    = isH2h ? 'h2h-style' : '';
      const valStyle = isH2h ? 'h2h-style' : '';
      const h2hNote  = (isH2h && total.h2h_games_used) ? ` · ${total.h2h_games_used} matchups` : '';
      return `
        <div class="total-bar ${style}">
          <div>
            <div class="total-label">Predicted game total</div>
            <div class="total-breakdown">${awayTeam} ${total.away_pts_pred ?? '?'} + ${homeTeam} ${total.home_pts_pred ?? '?'}${h2hNote}</div>
          </div>
          <div class="total-value ${valStyle}">${total.predicted_total} pts</div>
        </div>`;
    }

    function renderModeView(game, mode) {
      const isH2h   = mode === 'h2h';
      const home    = isH2h ? game.home_h2h  : game.home_form;
      const away    = isH2h ? game.away_h2h  : game.away_form;
      const total   = isH2h ? game.h2h_total : game.form_total;

      if (isH2h && (!game.h2h_total && (!home || !Object.keys(home).length) && (!away || !Object.keys(away).length))) {
        return `<div class="no-h2h"><strong>No head-to-head history found</strong>These teams may not have faced each other this season yet.</div>`;
      }

      return `
        ${renderTotalBar(total, game.away_team, game.home_team, isH2h)}
        <div class="teams-grid">
          ${renderTeamBox(game.away_team, away, 'away', isH2h)}
          ${renderTeamBox(game.home_team, home, 'home', isH2h)}
        </div>`;
    }

    async function loadPredictions() {
      try {
        const res  = await fetch(PREDICTIONS_URL + '?t=' + Date.now());
        const data = await res.json();

        if (data.generated_at) {
          document.getElementById('generatedAt').innerHTML =
            `Last updated: <span>${formatTime(data.generated_at)}</span>`;
        }

        if (!data.games || data.games.length === 0) {
          renderNoGames();
          hideLoader();
          return;
        }

        const tabsEl   = document.getElementById('gameTabs');
        const panelsEl = document.getElementById('gamePanels');

        data.games.forEach((game, idx) => {
          // Game tab
          const tab = document.createElement('button');
          tab.className = 'game-tab' + (idx === 0 ? ' active' : '');
          tab.textContent = game.game;
          tab.addEventListener('click', () => {
            document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`panel-${idx}`).classList.add('active');
          });
          tabsEl.appendChild(tab);

          // Game panel with mode switcher
          const panel = document.createElement('div');
          panel.className = 'game-panel' + (idx === 0 ? ' active' : '');
          panel.id = `panel-${idx}`;

          panel.innerHTML = `
            <div class="mode-switcher">
              <button class="mode-btn form active" data-mode="form" data-panel="${idx}">Recent Form</button>
              <button class="mode-btn h2h" data-mode="h2h" data-panel="${idx}">H2H History</button>
            </div>
            <div class="mode-view active" id="view-form-${idx}">
              ${renderModeView(game, 'form')}
            </div>
            <div class="mode-view" id="view-h2h-${idx}">
              ${renderModeView(game, 'h2h')}
            </div>`;

          panelsEl.appendChild(panel);
        });

        // Mode switcher click handlers
        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx  = btn.dataset.panel;
            const mode = btn.dataset.mode;
            const panel = document.getElementById(`panel-${idx}`);
            panel.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            panel.querySelectorAll('.mode-view').forEach(v => v.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`view-${mode}-${idx}`).classList.add('active');
          });
        });

        hideLoader();

      } catch (err) {
        console.error('Failed to load predictions:', err);
        renderNoGames('Could not load predictions. Please try again later.');
        hideLoader();
      }
    }

    loadPredictions();
  </script>
</body>
</html>
