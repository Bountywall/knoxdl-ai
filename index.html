<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnoxDL AI — NBA Player Props Predictions</title>
  <meta name="description" content="Daily NBA player props predictions powered by AI. Points, rebounds, assists and more for every player in tonight's games." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5.19825 3.29918C5.80046 2 7.86697 2 12 2C16.133 2 18.1995 2 18.8017 3.29918C18.8535 3.41086 18.8972 3.52686 18.9323 3.6461C19.3414 5.0333 17.8802 6.64111 14.9577 9.85674L13 12L14.9577 14.1433C17.8802 17.3589 19.3414 18.9667 18.9323 20.3539C18.8972 20.4731 18.8535 20.5891 18.8017 20.7008C18.1995 22 16.133 22 12 22C7.86697 22 5.80046 22 5.19825 20.7008C5.14649 20.5891 5.10282 20.4731 5.06765 20.3539C4.65857 18.9667 6.11981 17.3589 9.0423 14.1433L11 12L9.0423 9.85674C6.11981 6.64111 4.65857 5.0333 5.06765 3.6461C5.10282 3.52686 5.14649 3.41086 5.19825 3.29918Z' fill='%2342ffb5'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #0a0e0c;
      --bg-surface:    #111714;
      --bg-card:       #141a17;
      --bg-card-hover: #1a2320;
      --border:        rgba(66,255,181,0.1);
      --border-strong: rgba(66,255,181,0.2);
      --accent:        #42ffb5;
      --accent-dim:    rgba(66,255,181,0.12);
      --text-primary:  #e8f5f0;
      --text-secondary:#7a9e8e;
      --text-muted:    #4a6357;
      --font-display:  'Space Grotesk', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --radius:        12px;
      --radius-sm:     8px;
      --max-w:         1100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,14,12,0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 24px;
      height: 62px; display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .brand-logo { width: 26px; height: 26px; flex-shrink: 0; }
    .brand-name {
      font-family: var(--font-display); font-size: 18px; font-weight: 600;
      color: var(--text-primary); letter-spacing: -0.3px;
    }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-links a {
      color: var(--text-secondary); text-decoration: none;
      font-size: 14px; transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    /* ── CONTAINER ── */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }

    /* ── HERO ── */
    .hero {
      padding: 60px 0 40px; text-align: center;
      position: relative; overflow: hidden;
    }
    .hero-glow {
      position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(66,255,181,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 700; letter-spacing: -1.2px; line-height: 1.1;
      margin-bottom: 14px;
    }
    .hero-title .accent { color: var(--accent); }
    .hero-sub {
      color: var(--text-secondary); font-size: 16px;
      max-width: 500px; margin: 0 auto 16px;
    }
    .generated-at {
      color: var(--text-muted); font-size: 12px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .generated-at span { color: var(--accent); }

    /* ── PREDICTIONS AREA ── */
    .predictions-area {
      position: relative;
      min-height: 520px;
      padding: 0 0 80px;
    }

    /* ── INLINE LOADER — sits inside predictions area only ── */
    .area-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--bg);
      border-radius: var(--radius);
      z-index: 10;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      min-height: 400px;
    }
    .area-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Logo with shimmer/breathe effect — no circles */
    .loader-logo-wrap {
      position: relative;
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Glowing halo behind logo using box-shadow on a sibling */
    .loader-halo {
      position: absolute;
      inset: -8px;
      border-radius: 4px;
      background: transparent;
      box-shadow: 0 0 0 0 rgba(66,255,181,0.5);
      animation: halo-pulse 2s ease-in-out infinite;
    }

    @keyframes halo-pulse {
      0%   { box-shadow: 0 0 0 0   rgba(66,255,181,0.35); }
      50%  { box-shadow: 0 0 28px 8px rgba(66,255,181,0.12); }
      100% { box-shadow: 0 0 0 0   rgba(66,255,181,0.35); }
    }

    .loader-logo {
      width: 48px; height: 48px; position: relative; z-index: 1;
      animation: logo-breathe 2s ease-in-out infinite;
    }

    @keyframes logo-breathe {
      0%   { transform: scale(1);    filter: drop-shadow(0 0 6px rgba(66,255,181,0.5)); }
      50%  { transform: scale(1.12); filter: drop-shadow(0 0 16px rgba(66,255,181,0.8)); }
      100% { transform: scale(1);    filter: drop-shadow(0 0 6px rgba(66,255,181,0.5)); }
    }

    .loader-label {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.2px;
    }

    /* Thin animated progress bar under the label */
    .loader-bar {
      width: 120px; height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 2px;
      animation: bar-slide 1.6s ease-in-out infinite;
    }
    @keyframes bar-slide {
      0%   { transform: translateX(-100%); opacity: 0.8; }
      50%  { opacity: 1; }
      100% { transform: translateX(350%); opacity: 0.8; }
    }

    /* Content fades in after loader hides */
    .games-wrapper {
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .games-wrapper.visible { opacity: 1; transform: translateY(0); }

    /* ── GAME TABS ── */
    .game-tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 28px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .game-tab {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
      padding: 8px 16px; cursor: pointer; transition: all 0.2s;
    }
    .game-tab:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .game-tab.active {
      background: var(--accent-dim); border-color: var(--accent); color: var(--accent);
    }

    /* ── GAME PANEL ── */
    .game-panel { display: none; }
    .game-panel.active { display: block; }

    .teams-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }

    /* ── TEAM BOX ── */
    .team-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .team-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg-card); z-index: 2;
    }
    .team-name {
      font-family: var(--font-display); font-size: 15px; font-weight: 600;
      color: var(--text-primary);
    }
    .team-side-badge {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px;
    }
    .team-side-badge.home {
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid var(--border-strong);
    }
    .team-side-badge.away {
      background: rgba(122,158,142,0.12); color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .players-scroll {
      max-height: 520px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent;
    }
    .players-scroll::-webkit-scrollbar { width: 4px; }
    .players-scroll::-webkit-scrollbar-track { background: transparent; }
    .players-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    /* ── PLAYER ROW ── */
    .player-row {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .player-row:last-child { border-bottom: none; }
    .player-row:hover { background: var(--bg-card-hover); }
    .player-name {
      font-size: 14px; font-weight: 500; color: var(--text-primary);
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .pos-badge {
      font-size: 10px; font-weight: 600; color: var(--text-muted);
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px; text-transform: uppercase;
    }
    .stat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    }
    .stat-cell {
      background: var(--bg-surface); border-radius: 6px;
      padding: 6px 8px; text-align: center;
    }
    .stat-val {
      font-family: var(--font-display); font-size: 15px; font-weight: 600;
      color: var(--text-primary); line-height: 1;
    }
    .stat-val.pts { color: var(--accent); }
    .stat-lbl {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px;
    }
    .player-meta {
      margin-top: 7px; display: flex; gap: 12px; align-items: center;
    }
    .meta-item {
      font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 4px;
    }
    .meta-item svg { width: 10px; height: 10px; stroke: var(--text-muted); }

    /* ── TOTAL BAR ── */
    .total-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-card); border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); padding: 12px 18px;
      margin-bottom: 16px;
    }
    .total-label {
      font-size: 13px; color: var(--text-secondary); font-weight: 500;
    }
    .total-value {
      font-family: var(--font-display); font-size: 20px; font-weight: 700;
      color: var(--accent);
    }
    .total-breakdown {
      font-size: 12px; color: var(--text-muted);
    }

    /* ── NO GAMES ── */
    .no-games {
      text-align: center; padding: 80px 24px;
      color: var(--text-secondary); font-size: 15px;
    }
    .no-games h2 {
      font-family: var(--font-display); font-size: 22px;
      color: var(--text-primary); margin-bottom: 10px;
    }

    /* ── FOOTER ── */
    .footer {
      background: var(--bg-surface); border-top: 1px solid var(--border);
      padding: 32px 0; text-align: center;
    }
    .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
    .footer-links a {
      color: var(--text-secondary); text-decoration: none;
      font-size: 13px; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }
    .footer-legal { color: var(--text-muted); font-size: 12px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .teams-grid { grid-template-columns: 1fr; }
      .nav-links  { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="https://knoxdl.com" class="brand">
        <svg viewBox="0 0 24 24" fill="none" class="brand-logo">
          <path d="M5.19825 3.29918C5.80046 2 7.86697 2 12 2C16.133 2 18.1995 2 18.8017 3.29918C18.8535 3.41086 18.8972 3.52686 18.9323 3.6461C19.3414 5.0333 17.8802 6.64111 14.9577 9.85674L13 12L14.9577 14.1433C17.8802 17.3589 19.3414 18.9667 18.9323 20.3539C18.8972 20.4731 18.8535 20.5891 18.8017 20.7008C18.1995 22 16.133 22 12 22C7.86697 22 5.80046 22 5.19825 20.7008C5.14649 20.5891 5.10282 20.4731 5.06765 20.3539C4.65857 18.9667 6.11981 17.3589 9.0423 14.1433L11 12L9.0423 9.85674C6.11981 6.64111 4.65857 5.0333 5.06765 3.6461C5.10282 3.52686 5.14649 3.41086 5.19825 3.29918Z" fill="#42ffb5"/>
        </svg>
        <span class="brand-name">KnoxDL</span>
      </a>
      <div class="nav-links">
        <a href="https://knoxdl.com">Downloader</a>
        <a href="/" class="active">AI Predictions</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-glow"></div>
    <div class="container">
      <h1 class="hero-title">Tonight's <span class="accent">NBA</span> Predictions</h1>
      <p class="hero-sub">AI-powered player props for every game tonight. Points, rebounds, assists and more — updated every morning.</p>
      <p class="generated-at" id="generatedAt"></p>
    </div>
  </section>

  <!-- PREDICTIONS -->
  <div class="container">
    <div class="predictions-area">

      <!-- Loader sits inside the predictions area -->
      <div class="area-loader" id="areaLoader">
        <div class="loader-logo-wrap">
          <div class="loader-halo"></div>
          <svg class="loader-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.19825 3.29918C5.80046 2 7.86697 2 12 2C16.133 2 18.1995 2 18.8017 3.29918C18.8535 3.41086 18.8972 3.52686 18.9323 3.6461C19.3414 5.0333 17.8802 6.64111 14.9577 9.85674L13 12L14.9577 14.1433C17.8802 17.3589 19.3414 18.9667 18.9323 20.3539C18.8972 20.4731 18.8535 20.5891 18.8017 20.7008C18.1995 22 16.133 22 12 22C7.86697 22 5.80046 22 5.19825 20.7008C5.14649 20.5891 5.10282 20.4731 5.06765 20.3539C4.65857 18.9667 6.11981 17.3589 9.0423 14.1433L11 12L9.0423 9.85674C6.11981 6.64111 4.65857 5.0333 5.06765 3.6461C5.10282 3.52686 5.14649 3.41086 5.19825 3.29918Z" fill="#42ffb5"/>
          </svg>
        </div>
        <span class="loader-label">Loading predictions</span>
        <div class="loader-bar"><div class="loader-bar-fill"></div></div>
      </div>

      <!-- Predictions content -->
      <div class="games-wrapper" id="gamesWrapper">
        <div class="game-tabs" id="gameTabs"></div>
        <div id="gamePanels"></div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <a href="https://knoxdl.com">KnoxDL</a>
        <a href="https://knoxdl.com/privacy.html">Privacy</a>
        <a href="https://knoxdl.com/terms.html">Terms</a>
      </div>
      <p class="footer-legal">© <span id="year"></span> KnoxDL · Predictions are for informational purposes only.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const PREDICTIONS_URL = './predictions.json';

    function formatTime(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString('en-US', {
          month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit',
          timeZoneName: 'short'
        });
      } catch { return ''; }
    }

    function hideLoader() {
      document.getElementById('areaLoader').classList.add('hidden');
      document.getElementById('gamesWrapper').classList.add('visible');
    }

    function renderNoGames(msg) {
      document.getElementById('gamePanels').innerHTML = `
        <div class="no-games">
          <h2>No games today</h2>
          <p>${msg || 'Check back tomorrow for the next predictions.'}</p>
        </div>`;
    }

    function renderPlayerRow(name, stats, position) {
      const pos = position || '';
      return `
        <div class="player-row">
          <div class="player-name">
            ${name}
            ${pos ? `<span class="pos-badge">${pos}</span>` : ''}
          </div>
          <div class="stat-grid">
            <div class="stat-cell">
              <div class="stat-val pts">${stats.points}</div>
              <div class="stat-lbl">PTS</div>
            </div>
            <div class="stat-cell">
              <div class="stat-val">${stats.rebounds}</div>
              <div class="stat-lbl">REB</div>
            </div>
            <div class="stat-cell">
              <div class="stat-val">${stats.assists}</div>
              <div class="stat-lbl">AST</div>
            </div>
            <div class="stat-cell">
              <div class="stat-val">${stats.minutes}</div>
              <div class="stat-lbl">MIN</div>
            </div>
          </div>
          <div class="player-meta">
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
              ${stats.steals} STL
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
              ${stats.blocks} BLK
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
              ${stats.turnovers} TOV
            </span>
            <span class="meta-item" style="margin-left:auto; color:var(--text-muted)">
              ${stats.games_analyzed}g sample
            </span>
          </div>
        </div>`;
    }

    function renderTeamBox(teamAbbrev, players, side) {
      const entries = Object.entries(players);
      if (entries.length === 0) {
        return `<div class="team-box">
          <div class="team-header">
            <span class="team-name">${teamAbbrev}</span>
            <span class="team-side-badge ${side}">${side}</span>
          </div>
          <div style="padding:24px;color:var(--text-muted);font-size:14px;text-align:center;">No data available</div>
        </div>`;
      }
      const rows = entries.map(([name, stats]) => renderPlayerRow(name, stats, stats.position)).join('');
      return `<div class="team-box">
        <div class="team-header">
          <span class="team-name">${teamAbbrev}</span>
          <span class="team-side-badge ${side}">${side}</span>
        </div>
        <div class="players-scroll">${rows}</div>
      </div>`;
    }

    async function loadPredictions() {
      try {
        const res  = await fetch(PREDICTIONS_URL + '?t=' + Date.now());
        const data = await res.json();

        if (data.generated_at) {
          document.getElementById('generatedAt').innerHTML =
            `Last updated: <span>${formatTime(data.generated_at)}</span>`;
        }

        if (!data.games || data.games.length === 0) {
          renderNoGames();
          hideLoader();
          return;
        }

        const tabsEl   = document.getElementById('gameTabs');
        const panelsEl = document.getElementById('gamePanels');

        data.games.forEach((game, idx) => {
          const tab = document.createElement('button');
          tab.className = 'game-tab' + (idx === 0 ? ' active' : '');
          tab.textContent = game.game;
          tab.addEventListener('click', () => {
            document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`panel-${idx}`).classList.add('active');
          });
          tabsEl.appendChild(tab);

          const panel = document.createElement('div');
          panel.className = 'game-panel' + (idx === 0 ? ' active' : '');
          panel.id = `panel-${idx}`;
          const totalBar = game.predicted_total ? `
            <div class="total-bar">
              <div>
                <div class="total-label">Predicted game total</div>
                <div class="total-breakdown">${game.away_team} ${game.away_pts_pred} + ${game.home_team} ${game.home_pts_pred}</div>
              </div>
              <div class="total-value">${game.predicted_total} pts</div>
            </div>` : '';

          panel.innerHTML = `
            ${totalBar}
            <div class="teams-grid">
              ${renderTeamBox(game.away_team, game.away_players || {}, 'away')}
              ${renderTeamBox(game.home_team, game.home_players || {}, 'home')}
            </div>`;
          panelsEl.appendChild(panel);
        });

        hideLoader();

      } catch (err) {
        console.error('Failed to load predictions:', err);
        renderNoGames('Could not load predictions. Please try again later.');
        hideLoader();
      }
    }

    loadPredictions();
  </script>
</body>
</html>
